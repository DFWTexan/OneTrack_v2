<div class="container">
  <div class="row">
    <div class="col-md-12">
      <div class="table-responsive">
        <mat-table [dataSource]="dataSource" class="table table-striped">
          <ng-container matColumnDef="employeeID">
            <th mat-header-cell *matHeaderCellDef>Employee ID</th>
            <td mat-cell *matCellDef="let teamMember">{{ teamMember.employeeID }}</td>
          </ng-container>

          <ng-container matColumnDef="geid">
            <th mat-header-cell *matHeaderCellDef>Team #</th>
            <td mat-cell *matCellDef="let teamMember">{{ teamMember.geid }}</td>
          </ng-container>

          <ng-container matColumnDef="name">
            <th mat-header-cell *matHeaderCellDef>Name</th>
            <td mat-cell *matCellDef="let teamMember">{{ teamMember.name }}</td>
          </ng-container>

          <ng-container matColumnDef="resStateAbv">
            <th mat-header-cell *matHeaderCellDef>Res</th>
            <td mat-cell *matCellDef="let teamMember">{{ teamMember.resStateAbv }}</td>
          </ng-container>

          <ng-container matColumnDef="workStateAbv">
            <th mat-header-cell *matHeaderCellDef>Work</th>
            <td mat-cell *matCellDef="let teamMember">{{ teamMember.workStateAbv }}</td>
          </ng-container>

          <ng-container matColumnDef="branchName">
            <th mat-header-cell *matHeaderCellDef>Branch Name</th>
            <td mat-cell *matCellDef="let teamMember">{{ teamMember.branchName }}</td>
          </ng-container>

          <ng-container matColumnDef="scoreNumber">
            <th mat-header-cell *matHeaderCellDef>Score #</th>
            <td mat-cell *matCellDef="let teamMember">{{ teamMember.scoreNumber }}</td>
          </ng-container>

          <ng-container matColumnDef="employmentID">
            <th mat-header-cell *matHeaderCellDef>Employment ID</th>
            <td mat-cell *matCellDef="let teamMember">{{ teamMember.employmentID }}</td>
          </ng-container>

          <!-- Define the header and row templates -->
          <mat-header-row *matHeaderRowDef="displayedColumns"></mat-header-row>
          <mat-row *matRowDef="let row; columns: displayedColumns;"></mat-row>
        </mat-table>
        <mat-paginator [pageSizeOptions]="[5, 10, 20]" showFirstLastButtons></mat-paginator>
      </div>
    </div>
  </div>
</div>
