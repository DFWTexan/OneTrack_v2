<div class="container">
  <div class="row mb-5">
    <div class="col-md-12">
      <div class="table-responsive">
        <table
          mat-table
          mat-table
          [dataSource]="dataSource"
          class="full-width-table"
        >
          <ng-container matColumnDef="employeeID">
            <th mat-header-cell *matHeaderCellDef class="align-left">
              Employee ID
            </th>
            <td mat-cell *matCellDef="let teamMember" class="align-left">
              {{ teamMember.employeeID }}
            </td>
          </ng-container>

          <ng-container matColumnDef="geid">
            <th mat-header-cell *matHeaderCellDef class="align-left">Team #</th>
            <td mat-cell *matCellDef="let teamMember" class="align-left">
              {{ teamMember.geid }}
            </td>
          </ng-container>

          <ng-container matColumnDef="name">
            <th mat-header-cell *matHeaderCellDef class="align-left">Name</th>
            <td mat-cell *matCellDef="let teamMember" class="align-left">
              {{ teamMember.name }}
            </td>
          </ng-container>

          <ng-container matColumnDef="resStateAbv">
            <th mat-header-cell *matHeaderCellDef class="align-left">Res</th>
            <td mat-cell *matCellDef="let teamMember" class="align-left">
              {{ teamMember.resStateAbv }}
            </td>
          </ng-container>

          <ng-container matColumnDef="workStateAbv">
            <th mat-header-cell *matHeaderCellDef class="align-left">Work</th>
            <td mat-cell *matCellDef="let teamMember" class="align-left">
              {{ teamMember.workStateAbv }}
            </td>
          </ng-container>

          <ng-container matColumnDef="branchName">
            <th mat-header-cell *matHeaderCellDef class="align-left">
              Branch Name
            </th>
            <td mat-cell *matCellDef="let teamMember" class="align-left">
              {{ teamMember.branchName }}
            </td>
          </ng-container>

          <ng-container matColumnDef="scoreNumber">
            <th mat-header-cell *matHeaderCellDef class="align-left">
              Score #
            </th>
            <td mat-cell *matCellDef="let teamMember" class="align-left">
              {{ teamMember.scoreNumber }}
            </td>
          </ng-container>

          <ng-container matColumnDef="employmentID">
            <th mat-header-cell *matHeaderCellDef class="align-left">
              Employment ID
            </th>
            <td mat-cell *matCellDef="let teamMember" class="align-left">
              {{ teamMember.employmentID }}
            </td>
          </ng-container>

          <ng-container matColumnDef="actions">
            <th mat-header-cell *matHeaderCellDef class="align-left">
              Actions
            </th>
            <td mat-cell *matCellDef="let teamMember" class="align-left">
              <button
                class="icon-edit-delete-button"
                type="button"
                (click)="action1(teamMember)"
              >
                <span class="material-symbols-outlined"> task </span>
              </button>
              <button
                class="icon-edit-delete-button"
                type="button"
                (click)="action2(teamMember)"
              >
                <span class="material-symbols-outlined"> list </span>
              </button>
            </td>
          </ng-container>

          <!-- Define the header and row templates -->
          <mat-header-row *matHeaderRowDef="displayedColumns"></mat-header-row>
          <mat-row *matRowDef="let row; columns: displayedColumns"></mat-row>
        </table>
        <mat-paginator
          [pageSizeOptions]="[5, 10, 20]"
          showFirstLastButtons
        ></mat-paginator>
      </div>
    </div>
  </div>
</div>
